<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social App Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  🌐 Social Pro
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card-box">
    <h3>تسجيل الدخول</h3>
    <input id="username" placeholder="اسم المستخدم">
    <button id="loginBtn">دخول</button>
  </div>

  <!-- POST -->
  <div class="card-box">
    <h3>إنشاء منشور</h3>
    <input id="imgUrl" placeholder="رابط الصورة">
    <input id="caption" placeholder="وصف الصورة">
    <button id="postBtn">نشر</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script src="script.js"></script>
</body>
</html>
